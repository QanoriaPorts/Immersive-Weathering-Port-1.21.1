# Mirrors common/src/main/resources/immersive_weathering.accesswidener for the
# NeoForge runtime, which uses access transformers instead of access wideners.
# Architectury Loom 1.9 didn't auto-convert the AW for our setup, so we ship
# this AT directly.
#
# Format: <visibility>[-f|+f] <class> [<member>]
#  - 'public-f' = public + remove final (replaces 'mutable' AW directive too)

# HoneycombItem.WAXABLES / WAX_OFF_BY_BLOCK
public-f net.minecraft.world.item.HoneycombItem WAXABLES
public-f net.minecraft.world.item.HoneycombItem WAX_OFF_BY_BLOCK

# BlockBehaviour$Properties.isRandomlyTicking
public net.minecraft.world.level.block.state.BlockBehaviour$Properties isRandomlyTicking

# Biome.getTemperature(BlockPos)
public net.minecraft.world.level.biome.Biome getTemperature(Lnet/minecraft/core/BlockPos;)F

# SpreadingSnowyDirtBlock.canPropagate / canBeGrass
public net.minecraft.world.level.block.SpreadingSnowyDirtBlock canPropagate(Lnet/minecraft/world/level/block/state/BlockState;Lnet/minecraft/world/level/LevelReader;Lnet/minecraft/core/BlockPos;)Z
public net.minecraft.world.level.block.SpreadingSnowyDirtBlock canBeGrass(Lnet/minecraft/world/level/block/state/BlockState;Lnet/minecraft/world/level/LevelReader;Lnet/minecraft/core/BlockPos;)Z
